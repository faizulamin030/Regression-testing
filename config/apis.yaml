# Global defaults
defaults:
  timeout_seconds: 30
  retries: 2
  retry_backoff_factor: 0.5
  retry_status_codes:
    - 408
    - 429
    - 500
    - 502
    - 503
    - 504

# Service-scoped API definitions
services:
  cas:
    display_name: "CAS Service"
    auth:
      apis:
        - authenticate
      token_json_path: token
    token_routing:
      payment: ib
      directposting: test
      titlefetch: test
      titlefetchiban: ib
      titlefetchconv: test
      remittancepayment: ib
      remittancedirectposting: test
      registerCustomer: test
      updatestatus: test
      getcustomerinformation: test
      modify: test
      alias: test
      getaliasinformation: test
      modifyalias: test
      delinkaccount: test
      linkaccount: test
      deleteaccount: test
      deletecustomer: test
      onestep: ib
      getdefaultaccount: test
      registercaa: ib
      

    apis:
      authenticate:
        endpoint: authenticate
        method: POST
        headers:
          Content-Type: application/json

      directposting:
        endpoint: /api/v1/paysyslabs/directposting
        method: POST
        headers:
          Content-Type: application/json

      titlefetch:
        endpoint: /api/v1/paysyslabs/titlefetch
        method: POST
        headers:
          Content-Type: application/json

      titlefetchiban:
        endpoint: /api/v1/paysyslabs/titlefetchibcon
        method: POST
        headers:
          Content-Type: application/json

      titlefetchconv:
        endpoint: /api/v1/paysyslabs/titlefetchconv
        method: POST
        headers:
          Content-Type: application/json

      payment:
        endpoint: /api/v1/paysyslabs/payment
        method: POST
        headers:
          Content-Type: application/json
      
      payment1:
        endpoint: /api/v1/paysyslabs/payment
        method: POST
        headers:
          Content-Type: application/json

      remittancepayment:
        endpoint: /api/v3/paysyslabs/remittance/payment
        method: POST
        headers:
          Content-Type: application/json

      remittancedirectposting:
        endpoint: /api/v3/paysyslabs/remittance/directposting
        method: POST
        headers:
          Content-Type: application/json
      
      registerCustomer:
        endpoint: /api/v1/paysyslabs/customers/registerCustomer
        method: POST
        headers:
          Content-Type: application/json

      registercaa:
        endpoint: /api/v1/paysyslabs/customers/registercaa
        method: POST
        headers:
          Content-Type: application/json
      
      updatestatus:
        endpoint: /api/v1/paysyslabs/customers/updatestatus
        method: POST
        headers:
          Content-Type: application/json
      
      getcustomerinformation:
        endpoint: /api/v1/paysyslabs/customers/getcustomerinformation
        method: POST
        headers:
          Content-Type: application/json

      modify:
        endpoint: /api/v1/paysyslabs/customers/modify
        method: POST
        headers:
          Content-Type: application/json
      
      alias:
        endpoint: /api/v1/paysyslabs/alias/registeralias
        method: POST
        headers:
          Content-Type: application/json

      getdefaultaccount:
        endpoint: /api/v1/paysyslabs/alias/getdefaultaccount
        method: POST
        headers:
          Content-Type: application/json

      getaliasinformation:
        endpoint: /api/v1/paysyslabs/alias/getaliasinformation
        method: POST
        headers:
          Content-Type: application/json

      modifyalias:
        endpoint: /api/v1/paysyslabs/alias/modify
        method: POST
        headers:
          Content-Type: application/json

      delinkaccount:
        endpoint: /api/v1/paysyslabs/alias/delinkaccount
        method: POST
        headers:
          Content-Type: application/json

      linkaccount:
        endpoint: /api/v1/paysyslabs/alias/linkaccount
        method: POST
        headers:
          Content-Type: application/json
      
      deleteaccount:
        endpoint: /api/v1/paysyslabs/account/deleteaccount
        method: POST
        headers:
          Content-Type: application/json
      
      deletecustomer:
        endpoint: /api/v1/paysyslabs/customers/delete
        method: POST
        headers:
          Content-Type: application/json
      
      onestep:
        endpoint: /api/v1/paysyslabs/customers/one-step
        method: POST
        headers:
          Content-Type: application/json

      pacs008:
        endpoint: /api/v1/iso20022/pacs008
        method: POST
        headers:
          Content-Type: application/json

      pacs002status:
        endpoint: /api/v1/iso20022/pacs002/status
        method: POST
        headers:
          Content-Type: application/json

    flows:
      pacs008_to_pacs002:
        initial_api: pacs008
        initial_request_file: tc004_pacs008.json
        polling:
          api: pacs002status
          request_file: tc005_pacs002_poll.json
          interval_seconds: 5
          timeout_seconds: 60
          correlation_from_response_json_path: transaction_id
          correlation_in_request_json_path: transaction_id
          stop_when:
            type: json_field
            field: transaction_status
            allowed_values:
              - ACSP
              - RJCT
      Chained-Dependent:
        initial_api: getdefaultaccount
        on_success:
          next_api: directposting
          next_request_file: tc174_payment_from_alias.json
          mappings:
            - from: default-account-byalias.id.iban
              to: RECEIVER_IBAN
            - from: default-account-byalias.name
              to: RECEIVER_NAME
            - from: default-account-byalias.servicer.memberId
              to: RECEIVER_PARTICIPANT_CODE
      Chained-TitleFetch-DirectPosting:
        initial_api: titlefetch
        #initial_request_file: tc176_title_fetch.json
        on_success:
          next_api: directposting
          next_request_file: tc177_directposting.json
          mappings:
            - from: account-information.iban
              to: RECEIVER_IBAN
            - from: memberid
              to: RECEIVER_PARTICIPANT_CODE
            - from: account-information.acctitle
              to: RECEIVER_NAME

  acquiring:
    display_name: "Acquiring Service"
    auth:
      apis:
        - authenticate
      token_json_path: access_token
    token_routing:
      transaction: default
      transaction_status: default
    apis:
      authenticate:
        endpoint: /auth/login
        method: POST
        headers:
          Content-Type: application/json

      transaction:
        endpoint: /api/v1/transactions
        method: POST
        headers:
          Content-Type: application/json

      transaction_status:
        endpoint: /api/v1/transactions/{transaction_id}/status
        method: GET
        headers:
          Content-Type: application/json

  merchant_cas:
    display_name: "Merchant CAS Service"
    auth:
      apis:
        - authenticate
      token_json_path: token
    token_routing:
      payment: default
      payment_status: default
      merchant_payment_direct_sqrc: test
      merchant_payment_sqrc: ib
      merchant_payment_alias: ib
      merchant_payment_direct_rtpn: test
      merchant_payment_direct_rtpl: test
      merchant_payment_direct_dqrc: test
    apis:
      authenticate:
        endpoint: /authenticate
        method: POST
        headers:
          Content-Type: application/json

      payment:
        endpoint: /merchant/api/v1/payment
        method: POST
        headers:
          Content-Type: application/json

      merchant_payment_direct_sqrc:
        endpoint: /api/v1/paysyslabs/merchant/payment/direct/SQRC
        method: POST
        headers:
          Content-Type: application/json

      merchant_payment_sqrc:
        endpoint: /api/v1/paysyslabs/merchant/payment/SQRC
        method: POST
        headers:
          Content-Type: application/json

      merchant_payment_alias:
        endpoint: /api/v1/paysyslabs/merchant/payment/alias
        method: POST
        headers:
          Content-Type: application/json

      merchant_payment_direct_rtpn:
        endpoint: /api/v1/paysyslabs/merchant/payment/direct/RTPN
        method: POST
        headers:
          Content-Type: application/json

      merchant_payment_direct_rtpl:
        endpoint: /api/v1/paysyslabs/merchant/payment/direct/RTPL
        method: POST
        headers:
          Content-Type: application/json

      merchant_payment_direct_dqrc:
        endpoint: /api/v1/paysyslabs/merchant/payment/direct/DQRC
        method: POST
        headers:
          Content-Type: application/json

      payment_status:
        endpoint: /merchant/api/v1/payment/{payment_id}/status
        method: GET
        headers:
          Content-Type: application/json

